<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Salary Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #5C94FC; /* Mario Sky Blue */
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
            image-rendering: pixelated;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group input {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 10px;
            border: 4px solid #000;
        }
        .stage {
            position: relative;
            width: 300px;
            height: 350px;
            background: transparent;
            overflow: hidden;
            margin: 20px 0;
        }
        .question-box {
            width: 50px;
            height: 50px;
            background: #FFD700;
            border: 4px solid #000;
            position: absolute;
            top: 50px;
            left: 125px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            z-index: 2;
            box-shadow: inset -4px -4px 0 #CC9900, inset 4px 4px 0 #FFF;
        }
        .question-box::after {
            content: "?";
            color: #CC9900;
            font-weight: bold;
        }
        .mario-pipe {
            width: 80px;
            height: 100px;
            background: #43B047;
            border: 4px solid #000;
            position: absolute;
            bottom: 0;
            left: 110px;
            z-index: 1;
            box-shadow: inset -10px 0 0 #2A7B2E, inset 10px 0 0 #76D67B;
        }
        .mario-pipe::before {
            content: "";
            position: absolute;
            top: -10px;
            left: -10px;
            width: 92px;
            height: 30px;
            background: #43B047;
            border: 4px solid #000;
            box-shadow: inset -10px 0 0 #2A7B2E, inset 10px 0 0 #76D67B;
        }
    </style>
</head>
<body>
    <div class="input-group">
        <input type="number" id="salaryInput" placeholder="Bruto Salaris (PM)" value="3500">
        <input type="number" id="hoursInput" placeholder="Uren per week" value="40">
    </div>
    <div class="stage">
        <div class="question-box"></div>
        <div class="mario-pipe"></div>
    </div>
    <div id="controls">
        <button onclick="startTracker()">START</button>
        <button onclick="stopTracker()">STOP</button>
    </div>
    <script>
        let startTime, intervalId;
        let grossTotal = 0, netTotal = 0;
        let isRunning = false;

        const calculateNetRates = (grossMonthly, weeklyHours) => {
            // 2024 Dutch Tax Simplified (Box 1)
            const annualGross = grossMonthly * 12;
            const vakantieGeld = annualGross * 0.08;
            const totalAnnualGross = annualGross + vakantieGeld;
            
            // Basic Tax brackets 2024
            let tax = 0;
            if (totalAnnualGross <= 75518) {
                tax = totalAnnualGross * 0.3697;
            } else {
                tax = (75518 * 0.3697) + ((totalAnnualGross - 75518) * 0.495);
            }

            // Simplified credits (Algemene heffingskorting + Arbeidskorting)
            const credits = 6000; // Rough average estimate
            const annualNet = Math.max(0, totalAnnualGross - tax + credits);
            
            const monthlyHours = (weeklyHours * 52) / 12;
            const workingSecondsPerMonth = monthlyHours * 3600;

            return {
                grossPerSecond: grossMonthly / workingSecondsPerMonth,
                netPerSecond: (annualNet / 12) / workingSecondsPerMonth
            };
        };

        function startTracker() {
            if (isRunning) return;
            isRunning = true;
            console.log("Starting tracker...");
            
            const grossMonthly = parseFloat(document.getElementById('salaryInput').value) || 0;
            const weeklyHours = parseFloat(document.getElementById('hoursInput').value) || 40;
            const rates = calculateNetRates(grossMonthly, weeklyHours);
            
            intervalId = setInterval(() => {
                grossTotal += rates.grossPerSecond;
                netTotal += rates.netPerSecond;
                updateUI();
            }, 100); // Update every 100ms for smoothness
        }

        function stopTracker() {
            isRunning = false;
            clearInterval(intervalId);
            console.log("Stopping tracker...");
        }

        function updateUI() {
            // We'll add UI elements for these in the next task
            console.log(`Gross: €${grossTotal.toFixed(4)} | Net: €${netTotal.toFixed(4)}`);
        }
    </script>
</body>
</html>
