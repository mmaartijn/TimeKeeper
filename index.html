<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Salary Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #5C94FC; /* Mario Sky Blue */
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
            image-rendering: pixelated;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group input {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 10px;
            border: 4px solid #000;
        }
        .stage {
            position: relative;
            width: 300px;
            height: 350px;
            background: transparent;
            overflow: hidden;
            margin: 20px 0;
        }
        .question-box {
            width: 50px;
            height: 50px;
            background: #FFD700;
            border: 4px solid #000;
            position: absolute;
            top: 50px;
            left: 125px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            z-index: 2;
            box-shadow: inset -4px -4px 0 #CC9900, inset 4px 4px 0 #FFF;
        }
        .question-box::after {
            content: "?";
            color: #CC9900;
            font-weight: bold;
        }
        .mario-pipe {
            width: 80px;
            height: 100px;
            background: #43B047;
            border: 4px solid #000;
            position: absolute;
            bottom: 0;
            left: 110px;
            z-index: 1;
            box-shadow: inset -10px 0 0 #2A7B2E, inset 10px 0 0 #76D67B;
        }
        .mario-pipe::before {
            content: "";
            position: absolute;
            top: -10px;
            left: -10px;
            width: 92px;
            height: 30px;
            background: #43B047;
            border: 4px solid #000;
            box-shadow: inset -10px 0 0 #2A7B2E, inset 10px 0 0 #76D67B;
        }
    </style>
</head>
<body>
    <div class="input-group">
        <input type="number" id="salaryInput" placeholder="Bruto Salaris (PM)" value="3500">
        <input type="number" id="hoursInput" placeholder="Uren per week" value="40">
    </div>
    <div class="stage">
        <div class="question-box"></div>
        <div class="mario-pipe"></div>
    </div>
    <div id="controls">
        <button onclick="startTracker()">START</button>
        <button onclick="stopTracker()">STOP</button>
    </div>
    <script>
        function startTracker() {
            console.log("Starting tracker...");
        }
        function stopTracker() {
            console.log("Stopping tracker...");
        }
    </script>
</body>
</html>
