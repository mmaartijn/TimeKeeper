<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Salary Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #5C94FC;
            /* Mario Sky Blue */
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            color: white;
            image-rendering: pixelated;
        }

        /* ─── Level selector ─── */
        .level-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .level-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 9px;
            padding: 8px 12px;
            border: 4px solid #000;
            cursor: pointer;
            background: #505050;
            color: #aaa;
            box-shadow: inset -4px -4px 0 #303030, inset 4px 4px 0 #808080;
            transition: none;
        }

        .level-btn.active {
            background: #FFD700;
            color: #000;
            box-shadow: inset -4px -4px 0 #CC9900, inset 4px 4px 0 #FFF176;
        }

        .level-btn:active {
            box-shadow: none;
            transform: translate(2px, 2px);
        }

        /* ─── Inputs ─── */
        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .input-group label {
            font-size: 10px;
            text-transform: uppercase;
        }

        .input-group input {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            padding: 10px;
            border: 4px solid #000;
            background: #fff;
            color: #000;
            text-align: center;
            width: 250px;
        }

        /* ─── Stat board ─── */
        .stat-board {
            background: rgba(0, 0, 0, 0.8);
            border: 4px solid #fff;
            padding: 15px;
            margin-bottom: 20px;
            width: 280px;
            text-align: left;
        }

        .stat-line {
            font-size: 10px;
            margin: 5px 0;
            line-height: 1.5;
        }

        .stat-value {
            color: #FFD700;
            float: right;
        }

        /* ─── Stage / animation ─── */
        .stage {
            position: relative;
            width: 300px;
            height: 350px;
            background: transparent;
            overflow: hidden;
            margin: 20px 0;
        }

        .question-box {
            width: 50px;
            height: 50px;
            background: #FFD700;
            border: 4px solid #000;
            position: absolute;
            top: 50px;
            left: 125px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            z-index: 2;
            box-shadow: inset -4px -4px 0 #CC9900, inset 4px 4px 0 #FFF;
        }

        .question-box::after {
            content: "?";
            color: #CC9900;
            font-weight: bold;
        }

        /* Level 2 question box: red tint */
        .level2-mode .question-box {
            background: #FF6B6B;
            box-shadow: inset -4px -4px 0 #AA0000, inset 4px 4px 0 #FFB3B3;
        }

        .level2-mode .question-box::after {
            color: #AA0000;
        }

        .question-box.jump {
            animation: jump 0.2s ease-out;
        }

        @keyframes jump {
            0%   { transform: translateY(0); }
            50%  { transform: translateY(-15px); }
            100% { transform: translateY(0); }
        }

        .mario-pipe {
            width: 80px;
            height: 100px;
            background: #43B047;
            border: 4px solid #000;
            position: absolute;
            bottom: 0;
            left: 110px;
            z-index: 1;
            box-shadow: inset -10px 0 0 #2A7B2E, inset 10px 0 0 #76D67B;
        }

        .mario-pipe::before {
            content: "";
            position: absolute;
            top: -10px;
            left: -10px;
            width: 92px;
            height: 30px;
            background: #43B047;
            border: 4px solid #000;
            box-shadow: inset -10px 0 0 #2A7B2E, inset 10px 0 0 #76D67B;
        }

        .coin {
            width: 20px;
            height: 30px;
            background: #FFD700;
            border: 3px solid #000;
            position: absolute;
            left: 140px;
            top: 55px;
            z-index: 0;
            animation: fall 1s cubic-bezier(0.5, 0, 1, 0.5) forwards;
            box-shadow: inset -4px 0 0 #CC9900;
        }

        /* Level 2 coins are red/euro-coloured */
        .coin.euro-coin {
            background: #FF6B6B;
            box-shadow: inset -4px 0 0 #AA0000;
            border-color: #AA0000;
        }

        @keyframes fall {
            0%   { transform: translateY(0) scaleX(1); opacity: 1; }
            80%  { transform: translateY(220px) scaleX(1); opacity: 1; }
            100% { transform: translateY(220px) scaleX(0); opacity: 0; }
        }

        /* ─── Controls ─── */
        #controls button {
            font-family: 'Press Start 2P', cursive;
            padding: 10px 20px;
            margin: 0 10px;
            border: 4px solid #000;
            background: #43B047;
            color: white;
            cursor: pointer;
            box-shadow: inset -4px -4px 0 #2A7B2E, inset 4px 4px 0 #76D67B;
        }

        #controls button:active {
            box-shadow: none;
            transform: translate(2px, 2px);
        }

        #controls button.stop {
            background: #FF0000;
            box-shadow: inset -4px -4px 0 #A00000, inset 4px 4px 0 #FF6666;
        }

        #controls button.reset {
            background: #505050;
            box-shadow: inset -4px -4px 0 #303030, inset 4px 4px 0 #808080;
        }

        /* ─── Hide/show helpers ─── */
        .level-panel {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .level-panel.visible {
            display: flex;
        }
    </style>
</head>

<body>
    <!-- Level selector -->
    <div class="level-selector">
        <button class="level-btn active" id="btnLevel1" onclick="switchLevel(1)">LEVEL 1</button>
        <button class="level-btn"        id="btnLevel2" onclick="switchLevel(2)">LEVEL 2</button>
    </div>

    <!-- ── LEVEL 1: Salaris tracker ── -->
    <div class="level-panel visible" id="panel1">
        <div class="stat-board">
            <div class="stat-line">BRUTO: <span id="grossLabel" class="stat-value">€0.00</span></div>
            <div class="stat-line">NETTO: <span id="netLabel"   class="stat-value">€0.00</span></div>
        </div>
        <div class="input-group">
            <label for="salaryInput">Maandelijkse Bruto Salaris</label>
            <input type="number" id="salaryInput" placeholder="Bruto Salaris (PM)">
            <label for="hoursInput">Uren per Week</label>
            <input type="number" id="hoursInput"  placeholder="Uren per week">
        </div>
    </div>

    <!-- ── LEVEL 2: Vergaderkosten ── -->
    <div class="level-panel" id="panel2">
        <div class="stat-board">
            <div class="stat-line">TIJD:   <span id="meetingTime"  class="stat-value">00:00</span></div>
            <div class="stat-line">KOSTEN: <span id="meetingCost"  class="stat-value">€0.00</span></div>
        </div>
        <div class="input-group">
            <label for="costPerHourInput">Kosten per collega (per uur)</label>
            <input type="number" id="costPerHourInput"    placeholder="€ per uur">
            <label for="participantsInput">Aantal deelnemers</label>
            <input type="number" id="participantsInput"   placeholder="Deelnemers">
        </div>
    </div>

    <!-- Shared animation stage -->
    <div class="stage" id="stage">
        <div class="question-box"></div>
        <div class="mario-pipe"></div>
    </div>

    <div id="controls">
        <button onclick="startTracker()">START</button>
        <button class="stop"  onclick="stopTracker()">STOP</button>
        <button class="reset" onclick="resetTracker()">RESET</button>
    </div>

    <script>
        // ── State ──────────────────────────────────────────────
        let intervalId;
        let isRunning = false;
        let audioCtx  = null;
        let currentLevel = 1;

        // Level 1
        let grossTotal = 0, netTotal = 0;

        // Level 2
        let meetingSeconds = 0;
        let meetingCostTotal = 0;

        // ── Level switching ────────────────────────────────────
        function switchLevel(level) {
            if (isRunning) stopTracker();
            resetTracker();

            currentLevel = level;

            document.getElementById('panel1').classList.toggle('visible', level === 1);
            document.getElementById('panel2').classList.toggle('visible', level === 2);
            document.getElementById('btnLevel1').classList.toggle('active', level === 1);
            document.getElementById('btnLevel2').classList.toggle('active', level === 2);

            // Tint the stage for Level 2
            document.getElementById('stage').classList.toggle('level2-mode', level === 2);

            initAudio();
            playCoinSound();
        }

        // ── Audio ──────────────────────────────────────────────
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playCoinSound() {
            if (!audioCtx) return;
            const osc  = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(987.77,  audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1318.51, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playStartSound() {
            if (!audioCtx) return;
            const osc  = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(523.25,  audioCtx.currentTime);
            osc.frequency.setValueAtTime(659.25,  audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(783.99,  audioCtx.currentTime + 0.2);
            osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        }

        function playStopSound() {
            if (!audioCtx) return;
            const osc  = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // ── Level 1: Tax calculation ───────────────────────────
        const calculateNetRates = (grossMonthly, weeklyHours) => {
            const annualGross      = grossMonthly * 12;
            const vakantieGeld     = annualGross * 0.08;
            const totalAnnualGross = annualGross + vakantieGeld;

            let tax = 0;
            if (totalAnnualGross <= 75518) {
                tax = totalAnnualGross * 0.3697;
            } else {
                tax = (75518 * 0.3697) + ((totalAnnualGross - 75518) * 0.495);
            }

            const credits  = 6000;
            const annualNet = Math.max(0, totalAnnualGross - tax + credits);

            const monthlyHours           = (weeklyHours * 52) / 12;
            const workingSecondsPerMonth = monthlyHours * 3600;

            return {
                grossPerSecond: grossMonthly / workingSecondsPerMonth,
                netPerSecond:   (annualNet / 12) / workingSecondsPerMonth
            };
        };

        // ── Controls ───────────────────────────────────────────
        function startTracker() {
            if (isRunning) return;
            initAudio();
            playStartSound();
            isRunning = true;

            const UPDATES_PER_SEC = 10;
            const TICK = 1000 / UPDATES_PER_SEC;

            if (currentLevel === 1) {
                const grossMonthly = parseFloat(document.getElementById('salaryInput').value) || 0;
                const weeklyHours  = parseFloat(document.getElementById('hoursInput').value)  || 40;
                const rates        = calculateNetRates(grossMonthly, weeklyHours);

                intervalId = setInterval(() => {
                    grossTotal += rates.grossPerSecond / UPDATES_PER_SEC;
                    netTotal   += rates.netPerSecond   / UPDATES_PER_SEC;
                    updateUI();
                }, TICK);

            } else {
                const costPerHour    = parseFloat(document.getElementById('costPerHourInput').value)  || 0;
                const participants   = parseFloat(document.getElementById('participantsInput').value) || 1;
                const costPerSecond  = (costPerHour * participants) / 3600;

                intervalId = setInterval(() => {
                    meetingSeconds   += 1 / UPDATES_PER_SEC;
                    meetingCostTotal += costPerSecond / UPDATES_PER_SEC;
                    updateUI();
                }, TICK);
            }
        }

        function stopTracker() {
            if (!isRunning) return;
            isRunning = false;
            clearInterval(intervalId);
            playStopSound();
        }

        function resetTracker() {
            // Level 1
            grossTotal = 0;
            netTotal   = 0;
            // Level 2
            meetingSeconds   = 0;
            meetingCostTotal = 0;
            updateUI(true);
        }

        // ── UI update ──────────────────────────────────────────
        function formatTime(totalSeconds) {
            const mins = Math.floor(totalSeconds / 60);
            const secs = Math.floor(totalSeconds % 60);
            return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
        }

        function updateUI(isReset = false) {
            if (currentLevel === 1) {
                document.getElementById('grossLabel').innerText = `€${grossTotal.toFixed(2)}`;
                document.getElementById('netLabel').innerText   = `€${netTotal.toFixed(2)}`;
            } else {
                document.getElementById('meetingTime').innerText = formatTime(meetingSeconds);
                document.getElementById('meetingCost').innerText = `€${meetingCostTotal.toFixed(2)}`;
            }

            if (isReset) return;

            if (isRunning && Math.random() > 0.85) {
                spawnCoin();
            }
        }

        // ── Coin animation ─────────────────────────────────────
        function spawnCoin() {
            const stage = document.getElementById('stage');
            const box   = document.querySelector('.question-box');

            box.classList.remove('jump');
            void box.offsetWidth;
            box.classList.add('jump');

            initAudio();
            playCoinSound();

            const coin = document.createElement('div');
            coin.className = currentLevel === 2 ? 'coin euro-coin' : 'coin';
            stage.appendChild(coin);

            setTimeout(() => coin.remove(), 1000);
        }
    </script>
</body>

</html>
